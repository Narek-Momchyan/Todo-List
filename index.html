<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%E2%9C%85%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Document</title>
</head>

<body>
    <div class="main">
        <form>
            <input type="text" placeholder="Add a new TODo" class="todo-input">
            <button class="todo-button" type="submit">
                <i class="fa-solid fa-plus"></i>
            </button>
            <select class="filter-todo">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
            </select>


        </form>
        <ul class="todo-list">
        </ul>
    </div>
    <script src="script.js"></script>
</body>

</html>
